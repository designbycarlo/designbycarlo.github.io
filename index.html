<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon - Design by Carlo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              manrope: ['Manrope', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>

  <body class="font-inter bg-gray-50">
    <section class="py-24 relative">
      <div class="w-full max-w-7xl px-4 md:px-5 lg:px-5 mx-auto">
        <div class="w-full md:px-16 px-10 md:pt-16 pt-10 pb-10 bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 rounded-2xl flex-col justify-end items-center lg:gap-28 md:gap-16 gap-10 inline-flex shadow-2xl">
          <div class="flex-col justify-end items-center lg:gap-16 gap-10 flex">
            <div class="w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg">
              <span class="text-3xl font-bold text-white">C</span>
            </div>
            
            <div class="flex-col justify-center items-center gap-10 flex">
              <div class="flex-col justify-start items-center gap-2.5 flex">
                <h2 class="text-center text-emerald-400 md:text-6xl text-5xl font-bold font-manrope leading-normal">
                  Coming Soon
                </h2>
                <p class="text-center text-gray-400 text-base font-normal leading-relaxed max-w-md">
                  Crafting something extraordinary. My new creative playground launches soon.
                </p>
              </div>
              <div class="flex items-start justify-center w-full gap-2 count-down-main">
                <div class="timer flex flex-col gap-0.5">
                  <div class="">
                    <h3 class="countdown-element days text-center text-white text-2xl font-bold font-manrope leading-9">52</h3>
                  </div>
                  <p class="text-center text-gray-500 text-xs font-normal leading-normal w-full">
                    DAYS
                  </p>
                </div>
                <h3 class="w-3 text-center text-gray-500 text-2xl font-medium font-manrope leading-9">
                  :
                </h3>
                <div class="timer flex flex-col gap-0.5">
                  <div class="">
                    <h3 class="countdown-element hours text-center text-white text-2xl font-bold font-manrope leading-9">04</h3>
                  </div>
                  <p class="text-center text-gray-500 text-xs font-normal leading-normal w-full">
                    HRS
                  </p>
                </div>
                <h3 class="w-3 text-center text-gray-500 text-2xl font-medium font-manrope leading-9">
                  :
                </h3>
                <div class="timer flex flex-col gap-0.5">
                  <div class="">
                    <h3 class="countdown-element minutes text-center text-white text-2xl font-bold font-manrope leading-9">00</h3>
                  </div>
                  <p class="text-center text-gray-500 text-xs font-normal leading-normal w-full">
                    MINS
                  </p>
                </div>
                <h3 class="w-3 text-center text-gray-500 text-2xl font-medium font-manrope leading-9">
                  :
                </h3>
                <div class="timer flex flex-col gap-0.5">
                  <div class="">
                    <h3 class="countdown-element seconds text-center text-white text-2xl font-bold font-manrope leading-9">45</h3>
                  </div>
                  <p class="text-center text-gray-500 text-xs font-normal leading-normal w-full">
                    SECS
                  </p>
                </div>
              </div>
              <div class="w-full flex-col justify-center items-center gap-5 flex">
                <h6 class="text-center text-emerald-400 text-base font-semibold leading-relaxed">
                  Launch Date: July 23, 2026
                </h6>
                <div class="justify-center items-center gap-2.5 flex sm:flex-row flex-col w-full px-4">
                  <input 
                    type="email" 
                    class="flex-1 sm:flex-none sm:w-80 focus:outline-none px-4 py-3 shadow-md text-gray-900 placeholder-gray-500 text-sm font-normal leading-relaxed h-12 bg-white rounded-lg focus:ring-2 focus:ring-emerald-400 transition-all duration-300" 
                    placeholder="Enter your email..."
                  />
                  <button 
                    class="sm:w-auto w-full px-6 py-3 bg-gradient-to-r from-emerald-400 to-emerald-500 hover:from-emerald-500 hover:to-emerald-600 transition-all duration-300 ease-in-out rounded-lg shadow-lg hover:shadow-emerald-500/50 font-semibold"
                  >
                    <span class="text-gray-900 text-sm font-semibold">Notify Me</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <p class="text-center text-gray-500 text-sm font-normal leading-snug">
            Questions? Let's talk:
            <a href="mailto:designbycarlo@gmail.com" class="text-emerald-400 hover:text-emerald-300 transition-all duration-300 font-semibold">
              designbycarlo@gmail.com</a>
          </p>
        </div>
      </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pagedone@1.1.2/src/js/pagedone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

    <script>
      // Countdown timer target
      let dest = new Date('Jul 23, 2026 23:59:59').getTime();
      
      let x = setInterval(function () {
        let now = new Date().getTime();
        let diff = dest - now;
        
        // Check if the countdown has reached zero or negative
        if (diff <= 0) {
          // Set the destination date to the same day next month
          let nextMonthDate = new Date();
          nextMonthDate.setMonth(nextMonthDate.getMonth() + 1);

          // If the current month is December, set the destination date to the same day next year
          if (nextMonthDate.getMonth() === 0) {
            nextMonthDate.setFullYear(nextMonthDate.getFullYear() + 1);
          }

          dest = nextMonthDate.getTime();
          return;
        }

        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((diff % (1000 * 60)) / 1000);

        if (days < 10) {
          days = `0${days}`;
        }
        if (hours < 10) {
          hours = `0${hours}`;
        }
        if (minutes < 10) {
          minutes = `0${minutes}`;
        }
        if (seconds < 10) {
          seconds = `0${seconds}`;
        }

        // Get elements by class name
        let countdownElements = document.getElementsByClassName('countdown-element');

        // Loop through the elements and update their content
        for (let i = 0; i < countdownElements.length; i++) {
          let className = countdownElements[i].classList[1];
          switch (className) {
            case 'days':
              countdownElements[i].innerHTML = days;
              break;
            case 'hours':
              countdownElements[i].innerHTML = hours;
              break;
            case 'minutes':
              countdownElements[i].innerHTML = minutes;
              break;
            case 'seconds':
              countdownElements[i].innerHTML = seconds;
              break;
            default:
              break;
          }
        }
      }, 1000);

      // Email subscription handler (optional)
      document.querySelector('button').addEventListener('click', function() {
        const emailInput = document.querySelector('input[type="email"]');
        if (emailInput.value) {
          alert('Thanks for your interest! We\'ll notify you when we launch.');
          emailInput.value = '';
        }
      });
    </script>
  </body>
</html>
